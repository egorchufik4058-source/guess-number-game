<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Игра</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script> <!-- Подключаем Telegram SDK -->
    <style> body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: var(--tg-theme-bg-color); font-family: sans-serif; } button { padding: 20px 40px; font-size: 24px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 16px; cursor: pointer; } .score { font-size: 32px; margin-bottom: 20px; color: var(--tg-theme-text-color); } </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="score">Score: 0</div>
        <button id="clickBtn">Нажми меня!</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;  // Получаем объект WebApp
        tg.expand();                      // Разворачиваем приложение на весь экран
        
        let score = 0;
        const scoreElement = document.querySelector('.score');
        document.getElementById('clickBtn').onclick = () => {
            score++;
            scoreElement.textContent = `Score: ${score}`;
            tg.HapticFeedback.impactOccurred('light'); // Вибрация при клике (поддержка SDK)
        };
    </script>
</body>
</html>
